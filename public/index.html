function StatusDot({ status }) {
  const colors = { ok: 'bg-green-400', error: 'bg-red-400', warning: 'bg-yellow-400', idle: 'bg-gray-500' };
  return <span className={`inline-block w-2 h-2 rounded-full ${colors[status] || colors.idle} ${status === 'ok' ? 'pulse-dot' : ''}`} />;
}

}

function CacheMetrics({ metrics }) {
  const total = metrics.anthropicCacheReadTokens + metrics.anthropicCacheWriteTokens + metrics.anthropicNonCacheTokens;
  const cacheRead = ((metrics.anthropicCacheReadTokens / total) * 100).toFixed(1);
  const cacheWrite = ((metrics.anthropicCacheWriteTokens / total) * 100).toFixed(1);
  const nonCache = ((metrics.anthropicNonCacheTokens / total) * 100).toFixed(1);

  return (
    <div className="card p-5">
      <h3 className="text-sm text-slate-400 uppercase tracking-wider font-medium mb-4">Cache Utilization (Anthropic)</h3>
      <div className="flex gap-1 h-6 rounded-lg overflow-hidden mb-4">
        <div className="bg-green-500 transition-all" style={{ width: `${cacheRead}%` }} title={`Cache Read: ${cacheRead}%`} />
        <div className="bg-yellow-500 transition-all" style={{ width: `${cacheWrite}%` }} title={`Cache Write: ${cacheWrite}%`} />
        <div className="bg-slate-600 transition-all" style={{ width: `${nonCache}%` }} title={`No Cache: ${nonCache}%`} />
      </div>
      <div className="grid grid-cols-3 gap-3 text-center">
        <div>
          <div className="text-lg font-bold text-green-400">{cacheRead}%</div>
          <div className="text-xs text-slate-400">Cache Hit</div>
          <div className="text-xs text-slate-500">{(metrics.anthropicCacheReadTokens / 1e6).toFixed(0)}M tokens</div>
        </div>
        <div>
          <div className="text-lg font-bold text-yellow-400">{cacheWrite}%</div>
          <div className="text-xs text-slate-400">Cache Write</div>
          <div className="text-xs text-slate-500">{(metrics.anthropicCacheWriteTokens / 1e6).toFixed(0)}M tokens</div>
        </div>
        <div>
          <div className="text-lg font-bold text-slate-400">{nonCache}%</div>
          <div className="text-xs text-slate-400">No Cache</div>
          <div className="text-xs text-slate-500">{(metrics.anthropicNonCacheTokens / 1e6).toFixed(0)}M tokens</div>
        </div>
      </div>
      <div className="mt-3 text-xs text-slate-500 border-t border-slate-700 pt-2">
        {metrics.note}
      </div>
    </div>
  );
}

function CronTable({ crons }) {
  const sorted = [...crons].sort((a, b) => {
    if (a.status === 'error' && b.status !== 'error') return -1;
    if (a.status !== 'error' && b.status === 'error') return 1;
    return 0;
  });

  return (
    <div className="card p-5 overflow-hidden">
      <h3 className="text-sm text-slate-400 uppercase tracking-wider font-medium mb-4">
        Cron Jobs ({crons.length})
        <span className="ml-2 text-red-400">{crons.filter(c => c.status === 'error').length} errors</span>
      </h3>
      <div className="overflow-x-auto max-h-80 overflow-y-auto">
        <table className="w-full text-xs">
          <thead className="sticky top-0 bg-slate-800">
            <tr className="text-slate-400 border-b border-slate-700">
              <th className="py-2 px-2 text-left">Status</th>
              <th className="py-2 px-2 text-left">Name</th>
              <th className="py-2 px-2 text-left">Agent</th>
              <th className="py-2 px-2 text-left">Schedule</th>
              <th className="py-2 px-2 text-right">Last (s)</th>
              <th className="py-2 px-2 text-right">Errors</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map((cron, i) => (
              <tr key={i} className={`border-b border-slate-800 ${cron.status === 'error' ? 'bg-red-950/20' : ''}`}>
                <td className="py-1.5 px-2"><StatusDot status={cron.status} /></td>
                <td className="py-1.5 px-2 text-slate-200 font-medium">{cron.name}</td>
                <td className="py-1.5 px-2 text-slate-400">{cron.agent}</td>
                <td className="py-1.5 px-2 text-slate-500 font-mono">{cron.schedule}</td>
                <td className="py-1.5 px-2 text-right text-slate-400">{cron.lastDuration > 0 ? `${cron.lastDuration}s` : '--'}</td>
                <td className="py-1.5 px-2 text-right">
                  <span className={cron.errors > 0 ? 'text-red-400 font-bold' : 'text-slate-500'}>{cron.errors}</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

            OpenClaw Infrastructure
          </h1>
          <p className="text-xs text-slate-400 mt-1">IB Solutions AI Workforce Dashboard</p>
        </div>
        <div className="flex items-center gap-3 text-xs text-slate-400">
          <span>Last update: {lastUpdate.toLocaleTimeString()}</span>
          {loading && <span className="text-blue-400">Refreshing...</span>}
          <button
            onClick={() => setLastUpdate(new Date())}
            className="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-slate-300 transition-colors"
          >
            Refresh
          </button>
        </div>
      </div>

      {/* Top Metrics Row */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
        <MetricCard
          title="30-Day Spend" value={`$${data.cost.total30d.toLocaleString()}`}
          subtitle={`${data.cost.tokens30d.toLocaleString()}M tokens`}
          icon="" glowClass="glow-blue"
        />
        <MetricCard
          title="Today's Spend" value={`$${data.cost.latestCost}`}
          subtitle={`${data.cost.latestTokens}M tokens`}
          trend={Number(costTrend)} icon=""
        />
        <MetricCard
          title="Active Agents" value={activeAgents}
          subtitle="13 registered" icon=""
        />
        <MetricCard
          title="Cron Health"
          value={cronErrors === 0 ? 'All Clear' : `${cronErrors} Errors`}
          subtitle={`${data.crons.length} total jobs`}
          icon={cronErrors > 0 ? '' : ''}
          glowClass={cronErrors > 0 ? 'glow-red' : 'glow-green'}
        />
      </div>

      {/* Charts Row */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <SpendChart data={data.cost.history} />
        <TokenPieChart data={data.tokenBreakdown} />
      </div>

      {/* Cache + Gateway Row */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <CacheMetrics metrics={data.cacheMetrics} />
        <GatewayStatus gateway={data.gateway} />
      </div>

      {/* Initiatives */}
      <div className="mb-6">
        <InitiativesGrid initiatives={data.initiatives} />
      </div>

      {/* Crons + Models */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
        <CronTable crons={data.crons} />
        <ModelTable models={data.models} />
      </div>

      {/* Footer */}
      <div className="text-center text-xs text-slate-600 py-4 border-t border-slate-800">
        OpenClaw Dashboard v1.0 &middot; IB Solutions &middot; Data refreshes from gateway API
        <br />
        Connect live data: set GATEWAY_URL and GATEWAY_AUTH environment variables on Vercel
      </div>
    </div>
  );
}

ReactDOM.render(<Dashboard />, document.getElementById('root'));
</script>
</body>
</html>
